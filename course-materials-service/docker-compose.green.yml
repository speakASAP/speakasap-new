services:
  # Material Generator - AI-powered material generation
  material-generator:
    build: ./services/material-generator
    container_name: course-materials-microservice-generator-green
    ports:
      - ${MATERIAL_GENERATOR_PORT:-3390}:${MATERIAL_GENERATOR_PORT:-3390}
    volumes:
      - ./shared:/app/shared:ro
      - ${DOCKER_VOLUME_BASE_PATH:-/srv/storagebox/statex/docker-volumes}/course-materials-microservice/logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
      - AI_ORCHESTRATOR_URL=${AI_ORCHESTRATOR_URL:-http://ai-microservice:3380}
      - NLP_SERVICE_URL=${NLP_SERVICE_URL:-http://ai-microservice-nlp-service:3381}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL:-https://logging.statex.cz}
      - LOGGING_SERVICE_API_PATH=${LOGGING_SERVICE_API_PATH:-/api/logs}
      - MATERIAL_GENERATOR_PORT=${MATERIAL_GENERATOR_PORT:-3390}
    restart: unless-stopped
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 50M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MATERIAL_GENERATOR_PORT:-3390}/health"]
      interval: 10s
      timeout: 10s
      retries: 2
      start_period: 30s

  # Material Manager - Material management and serving
  material-manager:
    build: ./services/material-manager
    container_name: course-materials-microservice-manager-green
    ports:
      - ${MATERIAL_MANAGER_PORT:-3391}:${MATERIAL_MANAGER_PORT:-3391}
    volumes:
      - ./shared:/app/shared:ro
      - ${DOCKER_VOLUME_BASE_PATH:-/srv/storagebox/statex/docker-volumes}/course-materials-microservice/logs:/app/logs
      - ${DOCKER_VOLUME_BASE_PATH:-/srv/storagebox/statex/docker-volumes}/course-materials-microservice/materials:/app/materials
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - REDIS_URL=${REDIS_URL}
      - LOGGING_SERVICE_URL=${LOGGING_SERVICE_URL:-https://logging.statex.cz}
      - LOGGING_SERVICE_API_PATH=${LOGGING_SERVICE_API_PATH:-/api/logs}
      - MATERIAL_MANAGER_PORT=${MATERIAL_MANAGER_PORT:-3391}
    restart: unless-stopped
    networks:
      - nginx-network
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 50M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MATERIAL_MANAGER_PORT:-3391}/health"]
      interval: 10s
      timeout: 10s
      retries: 2
      start_period: 30s

networks:
  nginx-network:
    external: true
